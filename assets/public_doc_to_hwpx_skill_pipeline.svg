<svg width="100%" viewBox="0 0 800 920" xmlns="http://www.w3.org/2000/svg">
<title>public-doc-to-hwpx 스킬 작동 구조</title>
<desc>당신의 콘텐츠부터 한글 문서 완성까지의 6단계 자동 생성 과정</desc>

<defs>
<style>
  .title { font-size: 24px; font-weight: 700; fill: #fff; text-anchor: middle; font-family: system-ui, sans-serif; }
  .stage-num { font-size: 13px; font-weight: 600; fill: #999; font-family: system-ui, sans-serif; }
  .box-main { font-size: 15px; font-weight: 700; fill: #fff; text-anchor: middle; }
  .box-sub { font-size: 12px; fill: #ddd; text-anchor: middle; }
  .arrow { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .footer { font-size: 12px; fill: #888; text-anchor: middle; font-style: italic; }
</style>
<marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
  <polygon points="0 0, 10 3, 0 6" fill="#555" />
</marker>
</defs>

<!-- Title -->
<text x="400" y="35" class="title">📋 공공기관 보고서 AI 자동생성 — 6단계 프로세스</text>

<!-- ===== STAGE 1 ===== -->
<text x="50" y="75" class="stage-num">STEP 1️⃣  당신의 콘텐츠 입력</text>
<rect x="40" y="85" width="720" height="75" rx="12" style="fill: #444; stroke: #666; stroke-width: 1.5;" />
<text x="400" y="115" class="box-main">💬 물어보거나 업로드하기</text>
<text x="400" y="135" class="box-sub">"AI 역량 강화 추진계획 작성해줄래?" 또는 마크다운·PDF 파일 업로드</text>

<line x1="400" y1="160" x2="400" y2="190" class="arrow" />

<!-- ===== STAGE 2 ===== -->
<text x="50" y="215" class="stage-num">STEP 2️⃣  보고서 양식 선택</text>
<g>
  <rect x="40" y="225" width="170" height="100" rx="10" style="fill: #1a5f8f; stroke: #4a9fd8; stroke-width: 1.5;" />
  <text x="125" y="260" class="box-main" style="font-size: 14px;">📄 1페이지</text>
  <text x="125" y="278" class="box-sub">의사결정자용</text>
  <text x="125" y="292" class="box-sub">핵심만 압축</text>
  <text x="125" y="306" class="box-sub">(35개 슬롯)</text>
</g>

<g>
  <rect x="230" y="225" width="170" height="100" rx="10" style="fill: #1a5f8f; stroke: #4a9fd8; stroke-width: 1.5;" />
  <text x="315" y="260" class="box-main" style="font-size: 14px;">📚 풀버전</text>
  <text x="315" y="278" class="box-sub">상세 보고서</text>
  <text x="315" y="292" class="box-sub">표지+목차+본문</text>
  <text x="315" y="306" class="box-sub">(127개 슬롯)</text>
</g>

<g>
  <rect x="420" y="225" width="170" height="100" rx="10" style="fill: #1a5f8f; stroke: #4a9fd8; stroke-width: 1.5;" />
  <text x="505" y="260" class="box-main" style="font-size: 14px;">🏛️ 공문/시행문</text>
  <text x="505" y="278" class="box-sub">외부 기관용</text>
  <text x="505" y="292" class="box-sub">형식 엄수</text>
  <text x="505" y="306" class="box-sub">(27개 슬롯)</text>
</g>

<g>
  <rect x="610" y="225" width="150" height="100" rx="10" style="fill: #1a5f8f; stroke: #4a9fd8; stroke-width: 1.5;" />
  <text x="685" y="260" class="box-main" style="font-size: 14px;">✉️ 메일</text>
  <text x="685" y="278" class="box-sub">협업자용</text>
  <text x="685" y="292" class="box-sub">본문만 추출</text>
  <text x="685" y="306" class="box-sub">(텍스트)</text>
</g>

<line x1="400" y1="325" x2="400" y2="355" class="arrow" />

<!-- ===== STAGE 3 ===== -->
<text x="50" y="380" class="stage-num">STEP 3️⃣  글쓰기 품질 높이기 (Author 가이드)</text>

<g>
  <rect x="40" y="390" width="220" height="130" rx="10" style="fill: #0a5642; stroke: #5dccaa; stroke-width: 1.5;" />
  <text x="150" y="420" class="box-main" style="font-size: 13px;">✍️ 보고서 작성 원칙</text>
  <text x="150" y="438" class="box-sub" style="font-size: 11px;">├─ 개조식 문체</text>
  <text x="150" y="452" class="box-sub" style="font-size: 11px;">├─ 두괄식 (결론부터)</text>
  <text x="150" y="466" class="box-sub" style="font-size: 11px;">├─ 한 문장 한 핵심</text>
  <text x="150" y="480" class="box-sub" style="font-size: 11px;">└─ 적·의·것·들 정리</text>
  <text x="150" y="501" class="box-sub" style="font-size: 10px; font-style: italic;">30초면 핵심 파악!</text>
</g>

<g>
  <rect x="280" y="390" width="220" height="130" rx="10" style="fill: #0a5642; stroke: #5dccaa; stroke-width: 1.5;" />
  <text x="390" y="420" class="box-main" style="font-size: 13px;">📋 목차·구조 가이드</text>
  <text x="390" y="438" class="box-sub" style="font-size: 11px;">├─ 11가지 보고 유형</text>
  <text x="390" y="452" class="box-sub" style="font-size: 11px;">├─ 결과보고형</text>
  <text x="390" y="466" class="box-sub" style="font-size: 11px;">├─ 진행보고형</text>
  <text x="390" y="480" class="box-sub" style="font-size: 11px;">└─ 동향보고형 등</text>
  <text x="390" y="501" class="box-sub" style="font-size: 10px; font-style: italic;">4·5·3절 표준 골격</text>
</g>

<g>
  <rect x="520" y="390" width="240" height="130" rx="10" style="fill: #0a5642; stroke: #5dccaa; stroke-width: 1.5;" />
  <text x="640" y="420" class="box-main" style="font-size: 13px;">📐 양식별 작성 규칙</text>
  <text x="640" y="438" class="box-sub" style="font-size: 11px;">├─ 1p 보고서 가이드</text>
  <text x="640" y="452" class="box-sub" style="font-size: 11px;">├─ 풀버전 가이드</text>
  <text x="640" y="466" class="box-sub" style="font-size: 11px;">├─ 공문 가이드</text>
  <text x="640" y="480" class="box-sub" style="font-size: 11px;">└─ 우수 예시 포함</text>
  <text x="640" y="501" class="box-sub" style="font-size: 10px; font-style: italic;">따라 하기만 하면 됨!</text>
</g>

<line x1="400" y1="520" x2="400" y2="550" class="arrow" />

<!-- ===== STAGE 4 ===== -->
<text x="50" y="575" class="stage-num">STEP 4️⃣  내용을 양식 칸에 맞추기 (자동 매핑)</text>

<g>
  <rect x="40" y="585" width="350" height="110" rx="10" style="fill: #3c348f; stroke: #afaaea; stroke-width: 1.5;" />
  <text x="215" y="615" class="box-main" style="font-size: 13px;">📋 양식의 빈 칸들</text>
  <text x="215" y="633" class="box-sub" style="font-size: 11px;">(skeleton_mapping.json)</text>
  <text x="215" y="650" class="box-sub" style="font-size: 11px;">↓</text>
  <text x="215" y="667" class="box-sub" style="font-size: 11px;">"제목", "작성자", "핵심내용"</text>
  <text x="215" y="684" class="box-sub" style="font-size: 11px;">어디에 뭘 넣을지 가이드</text>
</g>

<text x="420" y="630" style="font-size: 24px; text-anchor: middle;">➕</text>

<g>
  <rect x="460" y="585" width="300" height="110" rx="10" style="fill: #3c348f; stroke: #afaaea; stroke-width: 1.5;" />
  <text x="610" y="615" class="box-main" style="font-size: 13px;">💡 당신의 콘텐츠</text>
  <text x="610" y="633" class="box-sub" style="font-size: 11px;">(values.json)</text>
  <text x="610" y="650" class="box-sub" style="font-size: 11px;">↓</text>
  <text x="610" y="667" class="box-sub" style="font-size: 11px;">Claude가 추출·정리한</text>
  <text x="610" y="684" class="box-sub" style="font-size: 11px;">당신의 콘텐츠</text>
</g>

<text x="760" y="630" style="font-size: 24px; text-anchor: middle;">💎</text>

<line x1="400" y1="695" x2="400" y2="725" class="arrow" />

<!-- ===== STAGE 5 ===== -->
<text x="50" y="750" class="stage-num">STEP 5️⃣  한글 문서 자동생성 (Python 빌드 엔진)</text>

<g>
  <rect x="40" y="760" width="170" height="90" rx="10" style="fill: #663900; stroke: #ef9f27; stroke-width: 1.5;" />
  <text x="125" y="795" class="box-main" style="font-size: 13px;">🔄 칸 채우기</text>
  <text x="125" y="813" class="box-sub" style="font-size: 11px;">빈 칸에</text>
  <text x="125" y="827" class="box-sub" style="font-size: 11px;">콘텐츠 삽입</text>
</g>

<line x1="210" y1="805" x2="240" y2="805" class="arrow" />

<g>
  <rect x="250" y="760" width="170" height="90" rx="10" style="fill: #663900; stroke: #ef9f27; stroke-width: 1.5;" />
  <text x="335" y="795" class="box-main" style="font-size: 13px;">🔧 호환성 점검</text>
  <text x="335" y="813" class="box-sub" style="font-size: 11px;">한글</text>
  <text x="335" y="827" class="box-sub" style="font-size: 11px;">읽기 맞추기</text>
</g>

<line x1="420" y1="805" x2="450" y2="805" class="arrow" />

<g>
  <rect x="460" y="760" width="170" height="90" rx="10" style="fill: #663900; stroke: #ef9f27; stroke-width: 1.5;" />
  <text x="545" y="795" class="box-main" style="font-size: 13px;">📖 쪽번호 자동</text>
  <text x="545" y="813" class="box-sub" style="font-size: 11px;">목차의</text>
  <text x="545" y="827" class="box-sub" style="font-size: 11px;">쪽번호 계산</text>
</g>

<line x1="630" y1="805" x2="660" y2="805" class="arrow" />

<g>
  <rect x="670" y="760" width="170" height="90" rx="10" style="fill: #663900; stroke: #ef9f27; stroke-width: 1.5;" />
  <text x="755" y="795" class="box-main" style="font-size: 13px;">✓ 검사</text>
  <text x="755" y="813" class="box-sub" style="font-size: 11px;">문서</text>
  <text x="755" y="827" class="box-sub" style="font-size: 11px;">무결성 확인</text>
</g>

<line x1="400" y1="850" x2="400" y2="880" class="arrow" />

<!-- ===== STAGE 6 ===== -->
<text x="50" y="905" class="stage-num">STEP 6️⃣  완성 & 사용</text>
<rect x="40" y="915" width="720" height="75" rx="12" style="fill: #275d0a; stroke: #97c459; stroke-width: 1.5;" />
<text x="400" y="945" class="box-main" style="font-size: 14px;">📄 한글 문서 (.hwpx) 또는 메일 본문 (.md/.txt)</text>
<text x="400" y="970" class="box-sub">테이블·테두리·음영·페이지헤더 100% 그대로 → 바로 사용 가능!</text>
</svg>